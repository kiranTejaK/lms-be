name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025
      moto:
        image: motoserver/moto:latest
        ports:
          - 5000:5000
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    env:
      # Test environment variables (SQLite, no external services)
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: testpassword
      DB_NAME: test_db
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_NAME: "0"
      APP_PREFIX: doit
      CACHE_VERSION: v1
      JWT_SECRET_KEY: test-secret-key
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRY_IN_MINUTES: "30"
      JWT_REFRESH_TOKEN_EXPIRY_IN_MINUTES: "10080"
      LOG_LEVEL: WARNING
      ENABLE_FILE_LOGGING: "false"
      ENABLE_REQUEST_LOGGING: "false"
      ENVIRONMENT: testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=50

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fullstack-prod:latest .

      - name: Verify Docker image
        run: docker images fullstack-prod:latest
